<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>ReelCheck</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg: #040a0e;
        --surface: #0a1520;
        --border: #152030;
        --accent: #06d6a0;
        --accent-dim: rgba(6, 214, 160, 0.10);
        --accent-glow: rgba(6, 214, 160, 0.22);
        --text: #dff2f0;
        --muted: #5a8a99;
        --dim: #1e3545;
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        width: 260px;
        background: var(--bg);
        color: var(--text);
        font-family: 'Syne', sans-serif;
        user-select: none;
        overflow: hidden;
      }

      /* Scan-line texture */
      body::after {
        content: '';
        position: fixed;
        inset: 0;
        background: repeating-linear-gradient(
          0deg,
          transparent,
          transparent 2px,
          rgba(6, 214, 160, 0.013) 2px,
          rgba(6, 214, 160, 0.013) 4px
        );
        pointer-events: none;
        z-index: 100;
      }

      .container {
        padding: 18px 16px 14px;
        display: flex;
        flex-direction: column;
        gap: 0;
      }

      /* ── HEADER ── */
      .header {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 14px;
      }

      .logo {
        width: 32px;
        height: 32px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--accent-dim);
        border: 1px solid rgba(6, 214, 160, 0.28);
        border-radius: 8px;
        flex-shrink: 0;
      }

      .logo svg {
        filter: drop-shadow(0 0 5px var(--accent));
      }

      .brand-text {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      .brand-name {
        font-size: 16px;
        font-weight: 700;
        color: var(--text);
        letter-spacing: -0.01em;
        line-height: 1;
      }

      .brand-name em {
        font-style: normal;
        color: var(--accent);
      }

      .brand-sub {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 9px;
        color: var(--muted);
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      /* ── DIVIDER ── */
      .rule {
        height: 1px;
        background: linear-gradient(90deg, transparent, var(--border) 25%, var(--border) 75%, transparent);
        margin-bottom: 14px;
      }

      /* ── TOGGLE ROW ── */
      .toggle-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 12px;
      }

      .toggle-info {
        display: flex;
        flex-direction: column;
        gap: 3px;
      }

      .toggle-info-label {
        font-size: 13px;
        font-weight: 600;
        color: var(--text);
      }

      .toggle-info-state {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 9px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--muted);
        transition: color 0.25s ease;
      }

      .toggle-info-state.on { color: var(--accent); }

      /* ── CUSTOM TOGGLE ── */
      .pill {
        position: relative;
        width: 48px;
        height: 26px;
        cursor: pointer;
      }

      .pill input {
        opacity: 0;
        position: absolute;
        width: 0;
        height: 0;
      }

      .pill-track {
        position: absolute;
        inset: 0;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 26px;
        transition: background 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
      }

      .pill-thumb {
        position: absolute;
        width: 18px;
        height: 18px;
        top: 3px;
        left: 3px;
        background: var(--dim);
        border-radius: 50%;
        transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), background 0.25s ease, box-shadow 0.25s ease;
        pointer-events: none;
      }

      .pill input:checked ~ .pill-track {
        background: var(--accent-dim);
        border-color: rgba(6, 214, 160, 0.45);
        box-shadow: 0 0 14px var(--accent-glow);
      }

      .pill input:checked ~ .pill-track .pill-thumb {
        transform: translateX(22px);
        background: var(--accent);
        box-shadow: 0 0 8px rgba(6, 214, 160, 0.7);
      }

      /* ── STATUS CARD ── */
      .status-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 10px 12px;
        display: flex;
        align-items: center;
        gap: 9px;
        margin-bottom: 14px;
        transition: border-color 0.3s ease, box-shadow 0.3s ease;
      }

      .status-card.active {
        border-color: rgba(6, 214, 160, 0.2);
        box-shadow: inset 0 0 12px rgba(6, 214, 160, 0.04);
      }

      .status-beacon {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--dim);
        flex-shrink: 0;
        transition: background 0.3s ease, box-shadow 0.3s ease;
      }

      .status-beacon.live {
        background: var(--accent);
        box-shadow: 0 0 0 2px rgba(6, 214, 160, 0.18);
        animation: beacon 2.4s ease-in-out infinite;
      }

      @keyframes beacon {
        0%, 100% { box-shadow: 0 0 0 2px rgba(6, 214, 160, 0.18); }
        50%       { box-shadow: 0 0 0 5px rgba(6, 214, 160, 0.04); }
      }

      .status-message {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 10px;
        color: var(--muted);
        letter-spacing: 0.04em;
        transition: color 0.3s ease;
      }

      .status-message.live { color: var(--accent); }

      /* ── FOOTER ── */
      .footer { display: flex; justify-content: center; }

      .version {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 9px;
        color: var(--dim);
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <div class="container">

      <div class="header">
        <div class="logo">
          <svg width="17" height="17" viewBox="0 0 20 20" fill="none">
            <path d="M10 1.5L2.5 5.5v9l7.5 4 7.5-4v-9L10 1.5z" stroke="#06d6a0" stroke-width="1.3" stroke-linejoin="round"/>
            <path d="M7 10.5l2 2 4-4" stroke="#06d6a0" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="brand-text">
          <div class="brand-name">Reel<em>Check</em></div>
          <div class="brand-sub">Health verifier</div>
        </div>
      </div>

      <div class="rule"></div>

      <div class="toggle-row">
        <div class="toggle-info">
          <span class="toggle-info-label">Fact-checking</span>
          <span class="toggle-info-state" id="state-label">INACTIVE</span>
        </div>
        <label class="pill">
          <input type="checkbox" id="toggle" />
          <div class="pill-track">
            <div class="pill-thumb"></div>
          </div>
        </label>
      </div>

      <div class="status-card" id="status-card">
        <div class="status-beacon" id="beacon"></div>
        <span class="status-message" id="status-msg">Monitoring disabled</span>
      </div>

      <div class="footer">
        <span class="version">ReelCheck · v0.1.0</span>
      </div>

    </div>
    <script type="module" src="./src/popup.ts"></script>
  </body>
</html>
